<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史剪贴板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 20px;
    }

    .header {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .search-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #90caf9;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }

    .search-input:focus {
      border-color: #42a5f5;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }

    .btn-primary {
      background: #42a5f5;
      color: white;
    }

    .btn-primary:hover {
      background: #1e88e5;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(66, 165, 245, 0.4);
    }

    .btn-danger {
      background: #ef5350;
      color: white;
    }

    .btn-danger:hover {
      background: #e53935;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(239, 83, 80, 0.4);
    }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #666;
      font-size: 13px;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding-right: 10px;
    }

    .content::-webkit-scrollbar {
      width: 8px;
    }

    .content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 4px;
    }

    .content::-webkit-scrollbar-thumb {
      background: #90caf9;
      border-radius: 4px;
    }

    .content::-webkit-scrollbar-thumb:hover {
      background: #42a5f5;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: all 0.3s;
      cursor: pointer;
      position: relative;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }

    .card.pinned {
      border: 2px solid #ffd54f;
      background: #fffef7;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .card-time {
      font-size: 12px;
      color: #999;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      transform: scale(1.1);
    }

    .btn-pin {
      background: #fff9c4;
      color: #f57f17;
    }

    .btn-pin.active {
      background: #ffd54f;
      color: #f57f17;
    }

    .btn-delete {
      background: #ffcdd2;
      color: #c62828;
    }

    .card-content {
      color: #333;
      line-height: 1.6;
    }

    .card-content.text {
      font-size: 14px;
      word-break: break-all;
      max-height: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
    }

    .card-content.image {
      text-align: center;
    }

    .card-content img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
      object-fit: contain;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 30px;
      width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #333;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      color: #666;
      font-size: 14px;
    }

    .form-select {
      width: 100%;
      padding: 12px;
      border: 2px solid #90caf9;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn-secondary {
      background: #e0e0e0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #bdbdbd;
    }

    .pinned-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ffd54f;
      color: #f57f17;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索历史记录...">
        <button class="btn btn-primary" id="settingsBtn">设置</button>
        <button class="btn btn-danger" id="clearBtn">清空</button>
      </div>
      <div class="stats">
        <span id="statsText">共 0 条记录</span>
        <span id="retentionText">保存 3 天</span>
      </div>
    </div>

    <div class="content" id="content">
      <div class="empty-state">
        <div class="empty-state-icon">📋</div>
        <div>暂无历史记录</div>
        <div style="margin-top: 10px; font-size: 12px;">复制任何文本或图片后，会自动显示在这里</div>
      </div>
    </div>
  </div>

  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <div class="modal-title">设置</div>
      <div class="form-group">
        <label class="form-label">保存天数</label>
        <select class="form-select" id="retentionDays">
          <option value="1">1 天</option>
          <option value="3">3 天</option>
          <option value="5">5 天</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelBtn">取消</button>
        <button class="btn btn-primary" id="saveBtn">保存</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
